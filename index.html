<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Pro Max - Poker Master Security</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="left-sidebar">
    
    <div class="level-panel">
      <table class="level-table">
        <thead>
          <tr>
            <th>Lvl</th>
            <th>Small</th>
            <th>Big</th>
            <th>Ante</th>
          </tr>
        </thead>
        <tbody id="pokerLevelsContent"></tbody>
      </table>
    </div>

    <div class="stats-panel">
      <div class="stat-item">
        <span class="stat-label">Total Entries</span>
        <span class="stat-value" id="val-entries">57</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Total Stack</span>
        <span class="stat-value" id="val-tstack">5.700.000</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Avg Stack</span>
        <span class="stat-value" id="val-astack">183.870</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Next Break</span>
        <span class="stat-value" id="val-nbreak">00:36:56</span>
      </div>
    </div>

  </div>

  <div class="app-container">
     </div>

  <script src="script.js"></script>
</body>
</html>
